name: Run Python filter news Every 1 hour

on:
  schedule:
    - cron: '0 * * * *'   # 每1小時執行一次 (注意：此時間為 UTC 時間)
  workflow_dispatch:        # 允許手動觸發
  push:
    branches:
      - main

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 指定你使用的 Python 版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run the script
        # 將 env 區塊加在這裡，與 name 和 run 同層級
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_SUPERVISOR: ${{ secrets.DISCORD_WEBHOOK_URL_SUPERVISOR }}
          DISCORD_WEBHOOK_URL_OUTOFRED: ${{ secrets.DISCORD_WEBHOOK_URL_OUTOFRED }}
          DISCORD_WEBHOOK_URL_MOU: ${{ secrets.DISCORD_WEBHOOK_URL_MOU }}
        run: |
          python run.py
